<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 虛擬試妝 AR</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-pink-50">
    <nav class="p-4 text-center bg-white shadow">
        <h1 class="text-xl font-bold text-pink-600">AI Beauty Try-On AR</h1>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="step-start" class="text-center py-20">
            <button onclick="startCamera()" class="bg-pink-500 text-white px-6 py-3 rounded-full">
                開始試妝
            </button>
        </div>

        <div id="step-main" class="hidden grid md:grid-cols-3 gap-4">
            <div class="space-y-4">
                <div class="bg-white p-3 rounded shadow">
                    <h3 class="font-bold">類別</h3>
                    <button id="btn-base" onclick="select('底妝')">底妝</button>
                    <button id="btn-eye" onclick="select('眼妝')" class="active-btn">眼妝</button>
                    <button id="btn-lip" onclick="select('唇妝')">唇妝</button>
                </div>

                <div class="bg-white p-3 rounded shadow">
                    <h3 class="font-bold">AI推薦</h3>
                    <div id="ai"></div>
                </div>

                <div class="bg-white p-3 rounded shadow">
                    <h3 class="font-bold">產品</h3>
                    <div id="products"></div>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="camera-box">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
